<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脑部肿瘤图像检测系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .sidebar {
            min-height: 100vh;
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
        }

        .sidebar .nav-link {
            color: #333;
            transition: background-color 0.3s, color 0.3s;
        }

        .sidebar .nav-link:hover {
            background-color: #e7f1ff;
            color: #0d6efd;
            border-radius: 0.375rem;
        }

        .sidebar .nav-link.active {
            color: #0d6efd;
            font-weight: bold;
            background-color: #e7f1ff;
            border-radius: 0.375rem;
        }

        .main-content {
            padding: 20px;
        }

        .logo-area {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 左侧导航栏 -->
            <div class="col-md-2 sidebar p-0">
                <div class="logo-area">
                    <h4>脑部肿瘤检测</h4>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'home' %}active{% endif %}" href="/">
                            <i class="bi bi-house-door me-2"></i>首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'image_detect' %}active{% endif %}" href="/image_detect">
                            <i class="bi bi-image me-2"></i>图像检测
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'video_detect' %}active{% endif %}" href="/video_detect">
                            <i class="bi bi-camera-video me-2"></i>视频检测
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'image_record' %}active{% endif %}" href="/image_record">
                            <i class="bi bi-collection me-2"></i>图片记录
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'video_record' %}active{% endif %}" href="/video_record">
                            <i class="bi bi-film me-2"></i>视频记录
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'user_manage' %}active{% endif %}" href="/user_manage">
                            <i class="bi bi-people me-2"></i>用户管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'user_profile' %}active{% endif %}" href="/user_profile">
                            <i class="bi bi-person me-2"></i>个人中心
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/logout">
                            <i class="bi bi-box-arrow-right me-2"></i>退出登录
                        </a>
                    </li>
                </ul>
            </div>

            <!-- 右侧内容区 -->
            <div class="col-md-10 main-content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
