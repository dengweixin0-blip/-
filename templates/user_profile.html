{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">个人中心</h2>
<div class="row">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">
                <h5>个人信息</h5>
            </div>
            <div class="card-body text-center">
                <!-- 显示用户头像 -->
<!--                <img src="{{ url_for('static', filename='uploads/avatars/' + (avatar_url or 'default_avatar.jpg')) }}" class="rounded-circle mb-3" alt="用户头像" width="150" height="150">-->
                <h5>{{ username }}</h5>
                <p class="text-muted">{{ role }}</p>

                <!-- 上传头像的表单 -->
<!--                <form method="POST" action="{{ url_for('upload_avatar') }}" enctype="multipart/form-data">-->
<!--                    <div class="d-grid gap-2">-->
<!--                        <input type="file" name="avatar" accept="image/*" class="form-control mb-2" required>-->
<!--                        <button type="submit" class="btn btn-outline-primary">更换头像</button>-->
<!--                    </div>-->
<!--                </form>-->
            </div>

        </div>

    </div>
    <div class="col-md-8">
        <div class="card mb-4">
            <div class="card-header">
                <h5>账户设置</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('update_profile') }}">
                    <div class="mb-3 row">
                        <label for="staticUsername" class="col-sm-2 col-form-label">用户名</label>
                        <div class="col-sm-10">
                            <input type="text" readonly class="form-control-plaintext" id="staticUsername" value="{{ username }}">
                        </div>
                    </div>
                    <div class="mb-3 row">
                        <label for="inputEmail" class="col-sm-2 col-form-label">邮箱</label>
                        <div class="col-sm-10">
                            <input type="email" class="form-control" id="inputEmail" name="email" value="{{ email }}">
                        </div>
                    </div>
                    <div class="mb-3 row">
                        <label for="inputPhone" class="col-sm-2 col-form-label">手机号</label>
                        <div class="col-sm-10">
                            <input type="tel" class="form-control" id="inputPhone" name="phone" value="{{ phone }}">
                        </div>
                    </div>
                    <div class="text-end">
                        <button type="submit" class="btn btn-primary">保存更改</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5>修改密码</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('change_password') }}">
                    <div class="mb-3">
                        <label for="currentPassword" class="form-label">当前密码</label>
                        <input type="password" class="form-control" id="currentPassword" name="currentPassword" required>
                    </div>
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">新密码</label>
                        <input type="password" class="form-control" id="newPassword" name="newPassword" required>
                    </div>
                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">确认新密码</label>
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                    </div>
                    <div class="text-end">
                        <button type="submit" class="btn btn-primary">修改密码</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
